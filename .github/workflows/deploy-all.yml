name: Deploy All EUSUITE Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  KUBE_NAMESPACE: eucloud
  # Image Names
  IMG_DASHBOARD: eusuite-dashboard
  IMG_EUCLOUD_FRONT: eucloud-frontend
  IMG_EUCLOUD_BACK: eucloud-backend
  IMG_LOGIN: eusuite-login
  IMG_TYPE: eutype-frontend

jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- BUILD DASHBOARD ---
      - name: Build and Push Dashboard
        uses: docker/build-push-action@v5
        with:
          context: ./Applicationstartupdash
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMG_DASHBOARD }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMG_DASHBOARD }}:${{ github.sha }}

      # --- BUILD EUCLOUD FRONTEND ---
      - name: Build and Push EUCLOUD Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./EUCLOUD/frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMG_EUCLOUD_FRONT }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMG_EUCLOUD_FRONT }}:${{ github.sha }}

      # --- BUILD EUCLOUD BACKEND ---
      - name: Build and Push EUCLOUD Backend
        uses: docker/build-push-action@v5
        with:
          context: ./EUCLOUD/backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMG_EUCLOUD_BACK }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMG_EUCLOUD_BACK }}:${{ github.sha }}

      # --- BUILD LOGIN PAGE ---
      - name: Build and Push Login Page
        uses: docker/build-push-action@v5
        with:
          context: ./LoginPageCloud
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMG_LOGIN }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMG_LOGIN }}:${{ github.sha }}

      # --- BUILD TYPE ---
      - name: Build and Push Type
        uses: docker/build-push-action@v5
        with:
          context: ./Type
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMG_TYPE }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMG_TYPE }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure Namespace Exists
        run: |
          kubectl create namespace ${{ env.KUBE_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Docker Registry Secret
        run: |
          kubectl create secret docker-registry dockerhub-secret \
            --docker-server=https://index.docker.io/v1/ \
            --docker-username=${{ secrets.DOCKER_USERNAME }} \
            --docker-password=${{ secrets.DOCKER_TOKEN }} \
            --docker-email=${{ secrets.DOCKER_USERNAME }}@email.com \
            -n ${{ env.KUBE_NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      # --- DEPLOY EUCLOUD ---
      - name: Deploy EUCLOUD
        run: |
          # Apply PVC and Secrets first (if they exist)
          if [ -f EUCLOUD/k8s/pvc.yaml ]; then kubectl apply -f EUCLOUD/k8s/pvc.yaml -n ${{ env.KUBE_NAMESPACE }}; fi
          if [ -f EUCLOUD/k8s/secrets.yaml ]; then kubectl apply -f EUCLOUD/k8s/secrets.yaml -n ${{ env.KUBE_NAMESPACE }}; fi
          
          # Update image tags
          sed -i 's|image: .*eucloud-frontend:.*|image: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMG_EUCLOUD_FRONT }}:${{ github.sha }}|g' EUCLOUD/k8s/frontend-deployment.yaml
          sed -i 's|image: .*eucloud-backend:.*|image: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMG_EUCLOUD_BACK }}:${{ github.sha }}|g' EUCLOUD/k8s/backend-deployment.yaml
          
          # Apply Services and Deployments
          if [ -f EUCLOUD/k8s/services.yaml ]; then kubectl apply -f EUCLOUD/k8s/services.yaml -n ${{ env.KUBE_NAMESPACE }}; fi
          kubectl apply -f EUCLOUD/k8s/frontend-deployment.yaml -n ${{ env.KUBE_NAMESPACE }}
          kubectl apply -f EUCLOUD/k8s/backend-deployment.yaml -n ${{ env.KUBE_NAMESPACE }}

      # --- DEPLOY DASHBOARD ---
      - name: Deploy Dashboard
        run: |
          # Update image tag
          sed -i 's|image: .*eusuite-dashboard:.*|image: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMG_DASHBOARD }}:${{ github.sha }}|g' Applicationstartupdash/k8s/deployment.yaml
          # Apply
          kubectl apply -f Applicationstartupdash/k8s/deployment.yaml -n ${{ env.KUBE_NAMESPACE }}

      # --- DEPLOY LOGIN PAGE ---
      - name: Deploy Login Page
        run: |
          # Update image tag
          sed -i 's|image: .*eusuite-login:.*|image: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMG_LOGIN }}:${{ github.sha }}|g' LoginPageCloud/k8s/deployment.yaml
          # Apply
          if [ -f LoginPageCloud/k8s/service.yaml ]; then kubectl apply -f LoginPageCloud/k8s/service.yaml -n ${{ env.KUBE_NAMESPACE }}; fi
          kubectl apply -f LoginPageCloud/k8s/deployment.yaml -n ${{ env.KUBE_NAMESPACE }}

      # --- DEPLOY TYPE ---
      - name: Deploy Type
        run: |
          # Update image tag
          sed -i 's|image: .*eutype-frontend:.*|image: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMG_TYPE }}:${{ github.sha }}|g' Type/k8s/deployment.yaml
          # Apply
          if [ -f Type/k8s/service.yaml ]; then kubectl apply -f Type/k8s/service.yaml -n ${{ env.KUBE_NAMESPACE }}; fi
          kubectl apply -f Type/k8s/deployment.yaml -n ${{ env.KUBE_NAMESPACE }}

      - name: Force Restart All Deployments
        run: |
          kubectl rollout restart deployment -n ${{ env.KUBE_NAMESPACE }}
