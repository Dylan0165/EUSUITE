name: Dashboard CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'Applicationstartupdash/**'
      - '.github/workflows/dashboard.yml'

env:
  IMAGE_NAME: dylan016504/eusuite-dashboard
  NAMESPACE: eucloud

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./Applicationstartupdash
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Create Docker Hub secret
        run: |
          kubectl create secret docker-registry dockerhub-secret \
            --docker-server=https://index.docker.io/v1/ \
            --docker-username=${{ secrets.DOCKER_USERNAME }} \
            --docker-password=${{ secrets.DOCKER_TOKEN }} \
            --docker-email=${{ secrets.DOCKER_USERNAME }}@docker.io \
            -n ${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to Kubernetes
        run: |
          # Update image tag in deployment
          sed -i 's|image: dylan016504/eusuite-dashboard:latest|image: ${{ env.IMAGE_NAME }}:${{ github.sha }}|g' Applicationstartupdash/k8s/deployment.yaml
          
          # Apply manifests
          kubectl apply -f Applicationstartupdash/k8s/deployment.yaml
          
          # Restart rollout
          kubectl rollout restart deployment/eusuite-dashboard -n ${{ env.NAMESPACE }}
          
          # Wait for rollout
          kubectl rollout status deployment/eusuite-dashboard -n ${{ env.NAMESPACE }} --timeout=300s
