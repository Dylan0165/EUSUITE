apiVersion: apps/v1
kind: Deployment
metadata:
  name: coturn
  namespace: eucloud
  labels:
    app: coturn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coturn
  template:
    metadata:
      labels:
        app: coturn
    spec:
      containers:
        - name: coturn
          image: coturn/coturn:latest
          ports:
            - containerPort: 3478
              protocol: UDP
            - containerPort: 3478
              protocol: TCP
            - containerPort: 5349
              protocol: TCP
            # TURN relay ports range
            - containerPort: 49152
              protocol: UDP
            - containerPort: 49153
              protocol: UDP
            - containerPort: 49154
              protocol: UDP
            - containerPort: 49155
              protocol: UDP
          args:
            - "-n"
            - "--log-file=stdout"
            - "--listening-port=3478"
            - "--tls-listening-port=5349"
            - "--realm=eusuite.local"
            - "--server-name=turn.eusuite.local"
            # Static credentials for simplicity - in production use database
            - "--user=eugroups:EUGroupsTurn2024!"
            - "--lt-cred-mech"
            # External IP - your VM IP
            - "--external-ip=192.168.124.50"
            # Relay ports range
            - "--min-port=49152"
            - "--max-port=49155"
            # Security
            - "--no-multicast-peers"
            - "--denied-peer-ip=0.0.0.0-0.255.255.255"
            - "--denied-peer-ip=10.0.0.0-10.255.255.255"
            - "--denied-peer-ip=172.16.0.0-172.31.255.255"
            - "--denied-peer-ip=127.0.0.0-127.255.255.255"
            # Fingerprint for WebRTC compatibility
            - "--fingerprint"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
