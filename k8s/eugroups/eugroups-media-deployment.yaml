apiVersion: apps/v1
kind: Deployment
metadata:
  name: eugroups-media
  namespace: eucloud
  labels:
    app: eugroups-media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eugroups-media
  template:
    metadata:
      labels:
        app: eugroups-media
    spec:
      # Host network for RTP ports - mediasoup needs direct UDP access
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      imagePullSecrets:
        - name: docker-registry-secret
      containers:
        - name: eugroups-media
          image: dylan016504/eugroups-media-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: PORT
              value: "3000"
            - name: ANNOUNCED_IP
              value: "192.168.124.50"
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: eucloud-secrets
                  key: JWT_SECRET_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: eugroups-media
  namespace: eucloud
spec:
  type: NodePort
  selector:
    app: eugroups-media
  ports:
    - name: http-ws
      port: 3000
      targetPort: 3000
      nodePort: 30650
      protocol: TCP
