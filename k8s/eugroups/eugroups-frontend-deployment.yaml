apiVersion: apps/v1
kind: Deployment
metadata:
  name: eugroups-frontend
  namespace: eucloud
  labels:
    app: eugroups-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eugroups-frontend
  template:
    metadata:
      labels:
        app: eugroups-frontend
    spec:
      imagePullSecrets:
        - name: docker-registry-secret
      containers:
        - name: eugroups-frontend
          image: dylan016504/eugroups-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
