apiVersion: apps/v1
kind: Deployment
metadata:
  name: euadmin-frontend
  namespace: eucloud
  labels:
    app: euadmin-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: euadmin-frontend
  template:
    metadata:
      labels:
        app: euadmin-frontend
    spec:
      containers:
        - name: euadmin-frontend
          image: dylan016504/euadmin-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
      imagePullSecrets:
        - name: docker-registry-secret
---
apiVersion: v1
kind: Service
metadata:
  name: euadmin-frontend
  namespace: eucloud
spec:
  type: NodePort
  selector:
    app: euadmin-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30096
