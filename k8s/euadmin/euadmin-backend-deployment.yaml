apiVersion: apps/v1
kind: Deployment
metadata:
  name: euadmin-backend
  namespace: eucloud
  labels:
    app: euadmin-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: euadmin-backend
  template:
    metadata:
      labels:
        app: euadmin-backend
    spec:
      imagePullSecrets:
        - name: docker-registry-secret
      serviceAccountName: euadmin-backend
      containers:
        - name: euadmin-backend
          image: dylan016504/euadmin-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: eucloud-secrets
            - secretRef:
                name: euadmin-secrets
          env:
            - name: KUBERNETES_NAMESPACE
              value: "eucloud"
            - name: KUBE_NAMESPACE
              value: "eucloud"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
