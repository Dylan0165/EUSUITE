apiVersion: apps/v1
kind: Deployment
metadata:
  name: euadmin-backend
  namespace: eucloud
  labels:
    app: euadmin-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: euadmin-backend
  template:
    metadata:
      labels:
        app: euadmin-backend
    spec:
      imagePullSecrets:
        - name: docker-registry-secret
      serviceAccountName: euadmin-backend
      initContainers:
        - name: fix-permissions
          image: busybox:latest
          command: ['sh', '-c', 'chmod 777 /app/instance && chmod 666 /app/instance/eucloud.db || true && mkdir -p /app/data && chmod 777 /app/data']
          volumeMounts:
            - name: database
              mountPath: /app/instance
            - name: tenant-database
              mountPath: /app/data
          securityContext:
            runAsUser: 0
      containers:
        - name: euadmin-backend
          image: dylan016504/euadmin-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: euadmin-secrets
          env:
            - name: KUBERNETES_NAMESPACE
              value: "eucloud"
            - name: KUBE_NAMESPACE
              value: "eucloud"
            - name: DATABASE_PATH
              value: "/app/instance/eucloud.db"
            - name: DATABASE_URL
              value: "sqlite:////app/instance/eucloud.db"
            - name: TENANT_DATABASE_PATH
              value: "/app/data/tenant.db"
            - name: TENANT_DATABASE_URL
              value: "sqlite:////app/data/tenant.db"
            - name: DOCKER_REGISTRY
              value: "dylan016504"
            - name: NODEPORT_RANGE_START
              value: "30100"
            - name: NODEPORT_RANGE_END
              value: "30899"
          volumeMounts:
            - name: database
              mountPath: /app/instance
              readOnly: false
            - name: tenant-database
              mountPath: /app/data
              readOnly: false
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: database
          persistentVolumeClaim:
            claimName: eucloud-database-pvc
        - name: tenant-database
          persistentVolumeClaim:
            claimName: euadmin-tenant-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: euadmin-tenant-pvc
  namespace: eucloud
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
