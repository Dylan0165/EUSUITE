apiVersion: v1
kind: Secret
metadata:
  name: euadmin-secrets
  namespace: eucloud
type: Opaque
stringData:
  # Default admin credentials for development
  # Change these in production!
  ADMIN_EMAIL: "admin@test.nl"
  # Plain password for dev, or use Argon2 hash for production:
  # python -c "from argon2 import PasswordHasher; print(PasswordHasher().hash('YOUR_PASSWORD'))"
  ADMIN_PASSWORD_HASH: "admin123"
