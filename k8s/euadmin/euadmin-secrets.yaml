apiVersion: v1
kind: Secret
metadata:
  name: euadmin-secrets
  namespace: eucloud
type: Opaque
stringData:
  # Default admin credentials for development
  # Change these in production!
  ADMIN_EMAIL: "admin@eusuite.nl"
  # This is bcrypt hash of "admin123" - generate new one for production with:
  # python -c "from passlib.hash import bcrypt; print(bcrypt.hash('YOUR_PASSWORD'))"
  ADMIN_PASSWORD_HASH: "$2b$12$LQv3c1yqBWVHxkd0LHAkCOYz6TtxMQJqhN8/X4.JQ/q0.HJEj4QYy"
