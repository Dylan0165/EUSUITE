apiVersion: v1
kind: ServiceAccount
metadata:
  name: euadmin-backend
  namespace: eucloud
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: euadmin-metrics-reader
  namespace: eucloud
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: euadmin-metrics-reader
  namespace: eucloud
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: euadmin-metrics-reader
subjects:
  - kind: ServiceAccount
    name: euadmin-backend
    namespace: eucloud
---
# ClusterRole for metrics API access
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: euadmin-metrics-reader
rules:
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: euadmin-metrics-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: euadmin-metrics-reader
subjects:
  - kind: ServiceAccount
    name: euadmin-backend
    namespace: eucloud
