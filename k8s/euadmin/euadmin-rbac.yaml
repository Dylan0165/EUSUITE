apiVersion: v1
kind: ServiceAccount
metadata:
  name: euadmin-backend
  namespace: eucloud
---
# Role for eucloud namespace operations (existing services)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: euadmin-metrics-reader
  namespace: eucloud
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: euadmin-metrics-reader
  namespace: eucloud
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: euadmin-metrics-reader
subjects:
  - kind: ServiceAccount
    name: euadmin-backend
    namespace: eucloud
---
# ClusterRole for metrics API access
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: euadmin-metrics-reader
rules:
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: euadmin-metrics-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: euadmin-metrics-reader
subjects:
  - kind: ServiceAccount
    name: euadmin-backend
    namespace: eucloud
---
# ClusterRole for multi-tenant deployments (namespace creation, tenant resources)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: euadmin-tenant-deployer
rules:
  # Namespace management for tenants
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create", "update", "delete"]
  # Pod/Deployment management in any namespace
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "configmaps", "secrets", "persistentvolumeclaims"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # PersistentVolumes (cluster-scoped)
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Ingress/Networking
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Resource quotas
  - apiGroups: [""]
    resources: ["resourcequotas", "limitranges"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: euadmin-tenant-deployer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: euadmin-tenant-deployer
subjects:
  - kind: ServiceAccount
    name: euadmin-backend
    namespace: eucloud
