apiVersion: apps/v1
kind: Deployment
metadata:
  name: eutype-frontend
  namespace: eucloud
  labels:
    app: eutype-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eutype-frontend
  template:
    metadata:
      labels:
        app: eutype-frontend
    spec:
      imagePullSecrets:
      - name: docker-registry-secret
      containers:
      - name: eutype
        image: dylan016504/eutype-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
