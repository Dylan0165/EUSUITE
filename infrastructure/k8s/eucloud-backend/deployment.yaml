apiVersion: apps/v1
kind: Deployment
metadata:
  name: eucloud-backend
  namespace: eucloud
  labels:
    app: eucloud-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eucloud-backend
  template:
    metadata:
      labels:
        app: eucloud-backend
    spec:
      imagePullSecrets:
      - name: docker-registry-secret
      containers:
      - name: backend
        image: dylan016504/eucloud-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        env:
        - name: FLASK_ENV
          value: "production"
        - name: SERVER_IP
          value: "192.168.124.50"
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: eucloud-secrets
              key: secret-key
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: eucloud-secrets
              key: jwt-secret-key
        volumeMounts:
        - name: uploads
          mountPath: /app/uploads
        - name: thumbnails
          mountPath: /app/thumbnails
        - name: database
          mountPath: /app/instance
      volumes:
      - name: uploads
        persistentVolumeClaim:
          claimName: eucloud-uploads-pvc
      - name: thumbnails
        persistentVolumeClaim:
          claimName: eucloud-thumbnails-pvc
      - name: database
        persistentVolumeClaim:
          claimName: eucloud-db-pvc
