apiVersion: apps/v1
kind: Deployment
metadata:
  name: eusuite-dashboard
  namespace: eucloud
  labels:
    app: eusuite-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eusuite-dashboard
  template:
    metadata:
      labels:
        app: eusuite-dashboard
    spec:
      imagePullSecrets:
      - name: docker-registry-secret
      containers:
      - name: dashboard
        image: dylan016504/eusuite-dashboard:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
